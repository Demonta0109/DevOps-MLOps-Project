name: CD - staging to main

on:
  push:
    branches: [main]

jobs:
  verify-promotion:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r ml/requirements.txt

      - name: Check that a model version is currently in Production stage
        working-directory: ml
        run: python check_production_model.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: verify-promotion
    environment: production
    steps:
      # TODO (Phase 8): declencher le deploy hook Render du service production
      # une fois RENDER_PRODUCTION_DEPLOY_HOOK disponible dans les secrets de
      # l'environnement "production", par exemple :
      #   curl -fsS -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}"
      - name: Deploy to production (placeholder until Render is set up)
        run: echo "Render production deploy not configured yet (Phase 8)"

name: CD - dev to staging

on:
  push:
    branches: [staging]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r ml/requirements.txt
          pip install -r tests/requirements.txt

      - name: Generate .env from secrets (used by docker-compose in the e2e test)
        run: |
          cat <<EOF > .env
          MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME=${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME=dvf-paris-price
          MODEL_STAGE=Staging
          EOF

      - name: Run full test suite (unit + integration + e2e)
        run: pytest -m ""
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: dvf-paris-price
          MODEL_STAGE: Staging

  train-and-register:
    runs-on: ubuntu-latest
    needs: test
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r ml/requirements.txt

      - name: Configure DVC remote authentication
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user "${{ secrets.DAGSHUB_USERNAME }}"
          dvc remote modify origin --local password "${{ secrets.DAGSHUB_TOKEN }}"

      - name: Pull raw data
        run: dvc pull data/raw/dvf.csv.dvc

      - name: Train candidate model and register it in MLflow (stage Staging)
        working-directory: ml
        run: >
          python train.py
          --raw-data ../data/raw/dvf.csv
          --processed-data ../data/processed/dvf_paris_clean.csv
          --dvc-file ../data/raw/dvf.csv.dvc
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: train-and-register
    environment: staging
    steps:
      - name: Deploy backend to Render (staging)
        run: curl -fsS -X POST "${{ secrets.RENDER_BACKEND_STAGING_DEPLOY_HOOK }}"

      - name: Deploy frontend to Render (staging)
        run: curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_STAGING_DEPLOY_HOOK }}"

  quality-gates:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r ml/requirements.txt

      - name: Build backend-ml image with the new Staging candidate
        run: docker build -t backend-ml:staging-candidate ./backend

      - name: Gate 2 - smoke test on the candidate container
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          docker run -d --name smoke-test -p 8000:8000 \
            -e MLFLOW_TRACKING_URI -e DAGSHUB_USERNAME -e DAGSHUB_TOKEN \
            -e MODEL_NAME=dvf-paris-price -e MODEL_STAGE=Staging \
            backend-ml:staging-candidate

          python3 - <<'PY'
          import json
          import time
          import urllib.request

          deadline = time.monotonic() + 300
          while time.monotonic() < deadline:
              try:
                  with urllib.request.urlopen("http://localhost:8000/health", timeout=5) as r:
                      if json.load(r).get("model_loaded"):
                          break
              except Exception:
                  pass
              time.sleep(5)
          else:
              raise SystemExit("Le modele candidat n'a jamais fini de charger dans les temps")

          payload = json.dumps(
              {"surface": 50, "pieces": 2, "lat": 48.85, "lon": 2.35, "code_postal": "75010"}
          ).encode()
          req = urllib.request.Request(
              "http://localhost:8000/predict",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          start = time.monotonic()
          with urllib.request.urlopen(req, timeout=10) as r:
              status = r.status
              body = json.load(r)
          elapsed = time.monotonic() - start

          print(f"HTTP {status}, prix={body.get('prix_estime')}, latence={elapsed:.2f}s")

          assert status == 200, "Gate 2 KO: /predict n'a pas renvoye 200"
          assert body.get("prix_estime", 0) > 0, "Gate 2 KO: prix_estime <= 0"
          assert elapsed < 2, f"Gate 2 KO: latence {elapsed:.2f}s >= 2s"
          print("Gate 2 OK")
          PY

      - name: Stop smoke test container
        if: always()
        run: docker logs smoke-test && docker rm -f smoke-test

      - name: Gate 1 - MAE threshold, then promote to Production if it passes
        working-directory: ml
        run: python promote.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
